<!DOCTYPE html>
<html lang="zh-TW" data-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>台股／美股看盤 — Albireus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
    <script src="./indicators.js"></script>
  </head>
  <body>
    <header class="toolbar">
      <div class="brand">
        <h1>看盤</h1>
        <span class="sub">Yahoo 日 K · 約 720 日</span>
      </div>
      <div class="search-wrap">
        <input
          id="searchInput"
          type="search"
          placeholder="搜尋代號或名稱（如 2330、AAPL）"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="suggest" class="suggest" role="listbox"></div>
      </div>
      <button type="button" class="btn" id="btnLoad">載入</button>
      <button type="button" class="btn btn-ghost" id="btnRefresh" title="重新整理">重整</button>
    </header>

    <div id="errorBanner" class="error-banner" role="alert"></div>

    <div class="layout">
      <section class="main">
        <div class="quote-bar" id="quoteBar">
          <span class="title" id="qSymbol">—</span>
          <span class="price" id="qPrice">—</span>
          <span class="chg" id="qChg">—</span>
          <span class="meta" id="qMeta"></span>
          <span class="status" id="qStatus">載入中…</span>
        </div>

        <div class="controls">
          <label>均線</label>
          <button type="button" class="chip active" data-ma="5">MA5</button>
          <button type="button" class="chip active" data-ma="10">MA10</button>
          <button type="button" class="chip active" data-ma="20">MA20</button>
          <button type="button" class="chip active" data-ma="60">MA60</button>
          <button type="button" class="chip active" data-ma="120">MA120</button>
          <button type="button" class="chip active" data-ma="240">MA240</button>
          <span style="width: 0.4rem"></span>
          <label>指標</label>
          <button type="button" class="chip active" data-ind="kd">KD</button>
          <button type="button" class="chip active" data-ind="macd">MACD</button>
          <button type="button" class="chip active" data-ind="rsi">RSI</button>
          <button type="button" class="chip active" data-ind="obv">OBV</button>
        </div>

        <div class="charts" id="charts">
          <div class="chart-pane main-pane">
            <span class="pane-label">日 K</span>
            <div class="chart-host" id="chartMain"></div>
          </div>
          <div class="chart-pane vol-pane">
            <span class="pane-label">成交量</span>
            <div class="chart-host" id="chartVol"></div>
          </div>
          <div class="chart-pane ind-pane" data-pane="kd" id="paneKd">
            <span class="pane-label">KD</span>
            <div class="chart-host" id="chartKd"></div>
          </div>
          <div class="chart-pane ind-pane" data-pane="macd" id="paneMacd">
            <span class="pane-label">MACD</span>
            <div class="chart-host" id="chartMacd"></div>
          </div>
          <div class="chart-pane ind-pane" data-pane="rsi" id="paneRsi">
            <span class="pane-label">RSI</span>
            <div class="chart-host" id="chartRsi"></div>
          </div>
          <div class="chart-pane ind-pane" data-pane="obv" id="paneObv">
            <span class="pane-label">OBV</span>
            <div class="chart-host" id="chartObv"></div>
          </div>
        </div>
        <p class="hint">拖曳平移 · 滾輪／捏合縮放時間軸 · 資料來源 Yahoo Finance（經本站代理）</p>
      </section>

      <aside class="watchlist" aria-label="觀察清單">
        <h2>觀察清單</h2>
        <div id="watchList"></div>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
