# Steel Browser — single image behind local Caddy (HTTPS on host :443)
services:
  steel:
    image: ghcr.io/steel-dev/steel-browser:latest
    container_name: albireus-steel
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:9223:9223"
    environment:
      # Public host only (no scheme). Set via .env next to this file.
      - DOMAIN=${STEEL_PUBLIC_HOST}
      - CDP_DOMAIN=${STEEL_PUBLIC_HOST}
    volumes:
      - steel-cache:/app/.cache
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  steel-cache:
